version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: prosper202_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: prosper202
      MYSQL_USER: prosper202_user
      MYSQL_PASSWORD: prosper202_password
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  memcached:
    image: memcached:alpine
    container_name: prosper202_memcached
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prosper202_app
    volumes:
      - .:/var/www/html
    environment:
      - VIRTUAL_HOST=localhost
    depends_on:
      - db
      - memcached
    restart: always

  web:
    image: caddy:alpine
    container_name: prosper202_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: always

volumes:
  db_data:
  caddy_data:
  caddy_config:
